<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SYSTEM-OS</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0a0a;
        color: #f0f0f0;
        font-family: monospace;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #header {
        padding: 16px 20px;
        border-bottom: 1px solid #222;
        font-size: 13px;
        color: #555;
      }
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .msg {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 14px;
        line-height: 1.5;
      }
      .msg.user {
        background: #1a1a1a;
        border: 1px solid #333;
        align-self: flex-end;
      }
      .msg.ai {
        background: #111;
        border: 1px solid #222;
        align-self: flex-start;
        color: #ccc;
      }
      #input-area {
        padding: 16px 20px;
        border-top: 1px solid #222;
        display: flex;
        gap: 10px;
      }
      #input {
        flex: 1;
        background: #111;
        border: 1px solid #333;
        color: #f0f0f0;
        padding: 10px 14px;
        border-radius: 6px;
        font-family: monospace;
        font-size: 14px;
        outline: none;
      }
      #input:focus {
        border-color: #555;
      }
      #btn {
        background: #f0f0f0;
        color: #0a0a0a;
        border: none;
        padding: 10px 18px;
        border-radius: 6px;
        font-family: monospace;
        font-weight: bold;
        cursor: pointer;
      }
      #btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="header">SYSTEM-OS — martos</div>

    <div id="messages"></div>

    <div id="input-area">
      <input
        type="file"
        id="file-input"
        accept=".txt,.pdf,.md,.js"
        style="display: none"
      />
      <button
        id="file-btn"
        style="
          background: #1a1a1a;
          color: #888;
          border: 1px solid #333;
          padding: 10px 14px;
          border-radius: 6px;
          font-family: monospace;
          cursor: pointer;
        "
      >
        📎
      </button>
      <input id="input" placeholder="escribe aquí..." />
      <button id="btn">enviar</button>
    </div>

    <script>
      const messages = document.getElementById("messages");
      const input = document.getElementById("input");
      const btn = document.getElementById("btn");

      function addMsg(text, role) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }

      async function send() {
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, "user");
        input.value = "";
        btn.disabled = true;

        try {
          const res = await fetch("/devchat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userId: "admin", message: text }),
          });

          const data = await res.json();
          addMsg(data.response || "sin respuesta", "ai");
        } catch (err) {
          addMsg("error de conexión", "ai");
        }

        btn.disabled = false;
        input.focus();
      }

      btn.addEventListener("click", send);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") send();
      });

      document.getElementById("file-btn").addEventListener("click", () => {
        document.getElementById("file-input").click();
      });

      document
        .getElementById("file-input")
        .addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const fileName = file.name;
          addMsg(`📎 ${fileName}`, "user");
          btn.disabled = true;
          try {
            const arrayBuffer = await file.arrayBuffer();
            const base64 = btoa(
              String.fromCharCode(...new Uint8Array(arrayBuffer)),
            );
            const res = await fetch("/upload-doc", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                userId: "admin",
                fileName,
                fileData: base64,
                fileType: file.type,
              }),
            });

            const data = await res.json();
            addMsg(data.response || "archivo guardado", "ai");
          } catch (err) {
            addMsg("error al subir archivo", "ai");
          }
          btn.disabled = false;
          e.target.value = "";
        });
    </script>
  </body>
</html>
